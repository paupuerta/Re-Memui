name: re_mem_ui
description: "ReMem - Language Learning Frontend"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^17.1.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Code generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Functional programming
  fpdart: ^1.1.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.11.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
